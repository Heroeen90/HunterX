name: hunterx
description: HunterX - Mobile Penetration Testing Suite
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.3
  web_socket_channel: ^2.4.5
  http: ^1.2.1

  # Terminal / SSH
  xterm: ^3.4.0
  dartssh2: ^2.9.0

  # UI
  flutter_animate: ^4.5.0
  lucide_icons: ^0.0.2
  google_fonts: ^6.2.1
  fl_chart: ^0.67.0
  shimmer: ^3.0.0

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  permission_handler: ^11.3.1
  network_info_plus: ^5.0.3
  wifi_scan: ^0.4.1
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
